<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Lucas Vaz</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Inter+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter Display', 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #C42BAB 0%, #8B1A78 50%, #C42BAB 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .title {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.75rem;
      letter-spacing: 0.02em;
    }

    .desc {
      font-size: clamp(0.875rem, 2vw, 1rem);
      color: #999;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      border-color: #C42BAB;
      background: rgba(196, 43, 171, 0.08);
      color: #C42BAB;
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    .glitch-line {
      position: fixed;
      height: 1px;
      background: #C42BAB;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .glitch-line:nth-child(1) { top: 20%; left: 0; width: 30%; }
    .glitch-line:nth-child(2) { top: 45%; right: 0; width: 20%; }
    .glitch-line:nth-child(3) { bottom: 30%; left: 10%; width: 40%; }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="glitch-line"></div>
  <div class="glitch-line"></div>
  <div class="glitch-line"></div>

  <div class="container">
    <div class="code">404</div>
    <h1 class="title">Page not found</h1>
    <p class="desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to portfolio
    </a>
  </div>
</body>
</html>
