  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }

    @font-face {
      font-family: 'OFFBIT';
      src: url('assets/fonts/OffBit-101.woff2') format('woff2'),
           url('assets/fonts/OffBit-101.ttf') format('truetype');
      font-weight: 101;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #000000;
      --accent: #C42BAB;
      --text: #FFFFFF;
      --text-secondary: #999999;
      --text-tertiary: #808080;
      --surface: #222222;
      --border: rgba(187, 187, 187, 0.2);
      --font: 'Inter Display', 'Inter', -apple-system, sans-serif;
      --gutter: clamp(1.5rem, 14vw, 225px);
      --radius: 8px;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    html.lenis, html.lenis body { height: auto; }
    .lenis.lenis-smooth { scroll-behavior: auto !important; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 400;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: -5px;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      opacity: 0.10;
      pointer-events: none;
      z-index: 9999;
      will-change: transform;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    img, video { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }

    @media (max-width: 768px) {
      body::after { opacity: 0.06; }
    }

    /* ===== PAGE TRANSITIONS ===== */
    @keyframes fadeOutOverlay { to { opacity: 0; } }
    .page-transition {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 99999;
      pointer-events: none;
      opacity: 1;
      animation: fadeOutOverlay 0.5s 0.05s forwards;
    }
    .page-transition.in { animation: none; opacity: 1; pointer-events: all; transition: opacity 0.3s; }
    .page-transition.in.out { opacity: 0; }

    /* ===== BACK TO TOP ===== */
    .back-to-top-wrap {
      display: flex;
      justify-content: flex-end;
      padding: 0 var(--gutter) 2rem;
    }
    .back-to-top {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .back-to-top:hover {
      background: rgba(196, 43, 171, 0.12);
      transform: translateY(-3px);
    }
    .back-to-top svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== BACK LINK ===== */
    /* ===== NAVIGATION ===== */
    .nav {
      position: fixed; top: 0; left: 0; width: 100%; max-width: 100vw; z-index: 10000;
      padding: 1.5rem var(--gutter);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(19, 19, 19, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      will-change: transform;
      transform: translateZ(0);
    }
    .back-link {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      transition: color 0.3s ease;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; font-weight: 500; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; }
    .nav-links a { position: relative; transition: color 0.3s ease; color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,0.8), 0 0 3px rgba(0,0,0,1); padding: 0.5rem 0; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s ease; }
    .nav-links a:hover::after { width: 100%; }
    .lang-toggle {
      display: flex; align-items: center;
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; margin-left: 1.5rem;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
      overflow: hidden;
    }
    .lang-btn {
      position: relative;
      background: none; border: none; color: rgba(255,255,255,0.4);
      padding: 0.625rem 0.75rem; min-height: 44px; cursor: pointer; transition: all 0.3s ease;
      font-family: var(--font); font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.1em;
    }
    .lang-btn.active { color: #fff; background: rgba(255,255,255,0.1); padding-left: 1.125rem; }
    .lang-btn.active::before {
      content: ''; position: absolute;
      left: 8px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
    }
    .lang-btn:hover { color: #fff; }

    /* ===== HERO ===== */
    .project-hero {
      position: relative;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12rem var(--gutter) 6rem;
      overflow: hidden;
    }
    .project-hero-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover;
      background-position: center 60%;
      opacity: 0.18;
      filter: blur(8px);
      transform: scale(1.05);
      z-index: 0;
    }
    .project-hero-bg video {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .project-hero h1,
    .project-hero .project-type,
    .project-hero .project-desc,
    .project-hero .project-role {
      position: relative;
      z-index: 1;
    }
    .project-hero h1 {
      font-family: 'OFFBIT', monospace;
      font-weight: 101;
      font-size: clamp(4rem, 10vw, 11rem);
      line-height: 1;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .project-hero .project-type {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-variant: small-caps;
    }
    .project-hero .project-desc {
      margin-top: 1.5rem;
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 780px;
      line-height: 1.7;
      text-wrap: balance;
    }
    .project-hero .project-role {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }

    /* ===== MEDIA GRID (CSS Grid — no JS masonry) ===== */
    .media-grid-wrapper {
      padding: 0 var(--gutter);
      margin: 80px auto 0;
      padding-bottom: 100px;
      max-width: 1800px;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
    }
    .media-item {
      overflow: hidden;
      cursor: pointer;
      border-radius: var(--radius);
      background: #111;
    }
    /* Span classes */
    .span-full { grid-column: 1 / -1; }
    .span-half { grid-column: span 3; }
    .span-third { grid-column: span 2; }
    .span-wide { grid-column: span 4; }
    .span-narrow { grid-column: span 2; }
    .media-item img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .media-item video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius);
      background: #111;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .span-third .media-item,
    .span-narrow .media-item,
    .media-item.span-third,
    .media-item.span-narrow {
      aspect-ratio: 1 / 1;
    }
    .span-third video,
    .span-narrow video,
    .span-third img,
    .span-narrow img {
      height: 100%;
      object-fit: cover;
    }
    /* Portrait videos (social media content) */
    .media-item.portrait video {
      aspect-ratio: 9 / 16;
    }
    /* Square videos (reactions, loops) */
    .media-item.square video {
      aspect-ratio: 1 / 1;
    }
    .media-item:hover img,
    .media-item:hover video {
      transform: scale(1.02);
    }

    /* Video with audio — play button overlay */
    .media-item video {
      cursor: pointer;
    }

    /* ===== CATEGORY SECTIONS ===== */
    .category-section {
      margin-top: 80px;
      margin-bottom: 20px;
      grid-column: 1 / -1;
    }
    .category-section:first-child {
      margin-top: 0;
    }
    .category-title {
      font-family: 'OFFBIT', monospace;
      font-weight: 101;
      font-size: clamp(1.8rem, 4.5vw, 3.5rem);
      color: #fff;
      margin-bottom: 28px;
      letter-spacing: 0.05em;
      opacity: 0.7;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
    }

    /* Reaction row: 4 items in a row */
    .reaction-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .reaction-row .media-item video {
      aspect-ratio: 1 / 1;
    }

    /* ===== SCROLL REVEAL ===== */
    .reveal {
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 10001;
      background: rgba(0, 0, 0, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      cursor: zoom-out;
    }
    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }
    .lightbox-content img,
    .lightbox-content video {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      display: block;
      transform: scale(0.92);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .lightbox.active .lightbox-content img,
    .lightbox.active .lightbox-content video {
      transform: scale(1);
    }
    .lightbox-content iframe {
      max-width: 92vw;
      max-height: 92vh;
      width: 80vw;
      height: 45vw;
      max-height: 80vh;
      border: none;
      transform: scale(0.92);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .lightbox.active .lightbox-content iframe {
      transform: scale(1);
    }

    /* YouTube embed wrapper */
    .yt-embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      background: #111;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .yt-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .yt-embed .yt-poster {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .yt-embed .yt-play {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 68px; height: 48px;
      background: rgba(0,0,0,0.7);
      border-radius: var(--radius);
      cursor: pointer;
      pointer-events: none;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }
    .yt-embed:hover .yt-play { background: #C42BAB; }
    .yt-embed .yt-play svg { width: 24px; height: 24px; fill: #fff; }
    .lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      z-index: 1001;
      line-height: 1;
      font-family: var(--font);
      transition: color 0.3s ease;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-close:hover { color: var(--accent); }

    /* ===== DIVIDER ===== */
    .divider {
      width: 60px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto;
      display: block;
    }

    /* ===== PREV / NEXT NAV ===== */
    .project-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(5rem, 10vw, 8rem) var(--gutter);
      max-width: 1800px;
      margin: 0 auto;
    }
    .project-nav a {
      transition: color 0.3s ease;
      display: block;
    }
    .project-nav a:hover { color: #888; }
    .project-nav .nav-label {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.35rem;
    }
    .project-nav .nav-name {
      font-family: 'Inter Display', 'Inter', sans-serif;
      font-size: clamp(1.4rem, 2.8vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .project-nav a:hover .nav-name { color: #888; }

    /* ===== FOOTER ===== */
    .footer {
      width: 100%;
      position: relative;
      overflow: hidden;
      background: color(display-p3 0.7686 0.1686 0.6706);
      padding-top: clamp(5rem, 14vw, 12rem);
    }
    @supports not (color: color(display-p3 0 0 0)) {
      .footer { background-color: #C42BAB; }
    }
    .footer-bg {
      width: 100%;
      height: auto;
      display: block;
    }
    .footer-overlay {
      position: absolute;
      left: 0; right: 0; top: 0; bottom: 38%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 3rem);
    }
    .footer-logo {
      width: clamp(60px, 8vw, 120px);
      height: auto;
      margin-right: calc((48px - clamp(60px, 8vw, 120px)) / 2);
    }
    .footer-copyright {
      width: clamp(160px, 22vw, 320px);
      height: auto;
    }
    @media (max-width: 768px) {
      .footer-logo { width: clamp(50px, 10vw, 75px); }
      .footer-copyright { width: clamp(140px, 28vw, 197px); }
    }
    @media (max-width: 480px) {
      .footer-logo { width: clamp(50px, 14vw, 75px); }
      .footer-copyright { width: clamp(140px, 40vw, 197px); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .media-grid,
      .category-grid {
        grid-template-columns: repeat(4, 1fr);
      }
      .span-half { grid-column: span 2; }
      .span-wide { grid-column: span 3; }
      .span-narrow { grid-column: span 1; }
      .span-third { grid-column: span 2; }
      .reaction-row { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .nav { padding: 1rem var(--gutter); }
      .project-hero { padding: 8rem var(--gutter) 4rem; min-height: 50vh; }
      .project-hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); }
      .media-grid-wrapper { padding: 0 var(--gutter); padding-bottom: 60px; margin: 60px auto 0; }
      .project-nav { padding: 3rem var(--gutter); }
      .media-grid,
      .category-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .span-full { grid-column: 1 / -1; }
      .span-half,
      .span-wide { grid-column: 1 / -1; }
      .span-narrow,
      .span-third { grid-column: span 1; }
    }

    /* ===== HAS AUDIO INDICATOR ===== */
    .has-audio { position: relative; }
    .has-audio::after {
      content: '\1F50A';
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      padding: 2px 6px;
      pointer-events: none;
      z-index: 2;
    }

    /* ===== MOBILE NAV TOGGLE ===== */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 10px;
      min-width: 44px;
      min-height: 44px;
      justify-content: center;
      align-items: center;
      z-index: 10001;
      border: none;
      background: none;
    }
    .nav-hamburger span {
      width: 22px; height: 1.5px;
      background: #fff;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .nav-hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4.5px, 4.5px); }
    .nav-hamburger.active span:nth-child(2) { opacity: 0; }
    .nav-hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4.5px, -4.5px); }

    @media (prefers-reduced-motion: reduce) {
      video { animation: none; }
    }

    @media (max-width: 768px) {
      .nav-hamburger { display: flex; margin-left: 0.75rem; }
      .nav.menu-open {
        height: 100vh; height: 100dvh;
        align-items: flex-start;
        background: #000;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
      .nav-links {
        display: none;
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        font-size: 1.2rem;
      }
      .nav-links.open { display: flex; }
      .nav-links a { text-shadow: none; padding: 0.75rem 1rem; min-height: 44px; display: flex; align-items: center; }
      .back-link {
        font-size: 0;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid rgba(196, 43, 171, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .back-link::after {
        content: '';
        width: 18px;
        height: 18px;
        border-left: 2px solid #C42BAB;
        border-bottom: 2px solid #C42BAB;
        transform: rotate(45deg);
        display: block;
        margin-left: 4px;
      }
    }

    @media (max-width: 480px) {
      .project-hero { padding: 6rem var(--gutter) 3rem; min-height: 40vh; }
      .project-hero h1 { font-size: clamp(2rem, 10vw, 3.5rem); }
      .project-hero .project-desc { font-size: 1rem; }
      .media-grid-wrapper { padding: 0 var(--gutter); padding-bottom: 40px; margin: 32px auto 0; }
      .media-grid,
      .category-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .span-full,
      .span-half,
      .span-wide,
      .span-narrow,
      .span-third { grid-column: 1 / -1; }
      .reaction-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }

    // ===== WEBP HELPER =====
    function createWebpImg(src, alt) {
      var dot = src.lastIndexOf('.');
      var pic = document.createElement('picture');
      if (dot !== -1) {
        var source = document.createElement('source');
        source.srcset = src.substring(0, dot) + '.webp';
        source.type = 'image/webp';
        pic.appendChild(source);
      }
      var img = document.createElement('img');
      img.src = src;
      img.alt = alt;
      img.loading = 'lazy';
      img.decoding = 'async';
      pic.appendChild(img);
      return pic;
    }

    // ===== GET PROJECT ID =====
    // Prefer pretty URL (/work/:slug), fall back to legacy ?id= for backward compat
    var pathMatch = window.location.pathname.match(/^\/work\/([^\/\?#]+)/);
    var projectId = pathMatch ? decodeURIComponent(pathMatch[1]) : new URLSearchParams(window.location.search).get('id');
    var projectIndex = projects.findIndex(function(p) { return p.id === projectId; });

    if (projectIndex === -1) {
      var notFoundLang = localStorage.getItem('lang') || 'en';
      document.getElementById('projectTitle').textContent = notFoundLang === 'pt' ? 'Projeto n\u00E3o encontrado' : 'Project not found';
      document.getElementById('projectType').textContent = '';
      document.getElementById('projectDesc').textContent = notFoundLang === 'pt' ? 'O projeto solicitado n\u00E3o existe.' : 'The requested project does not exist.';
      document.getElementById('projectRole').textContent = '';
      return;
    }

    var projectTitleSeo = project.name + ' \u2014 ' + (project.type || 'Art Direction Case Study') + ' | Lucas Vaz';
    var projectDescSeo = project.desc + ' Case study by Lucas Vaz, art director & graphic designer with 19+ years of experience.';

    // Canonical + og:url
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (canonicalEl) canonicalEl.href = projectUrl;
    var ogUrl = document.querySelector('meta[property="og:url"]');
    if (ogUrl) { ogUrl.content = projectUrl; } else {
      var m = document.createElement('meta'); m.setAttribute('property', 'og:url'); m.content = projectUrl; document.head.appendChild(m);
    }

    // Page title
    document.title = projectTitleSeo;

    // Meta description (dynamic per project)
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = projectDescSeo;

    // Open Graph
    var ogTitle = document.querySelector('meta[property="og:title"]');
    var ogDesc = document.querySelector('meta[property="og:description"]');
    var ogImg = document.querySelector('meta[property="og:image"]');

    if (ogImg) ogImg.content = projectImg;

    if (twTitle) twTitle.content = projectTitleSeo;
    if (twDesc) twDesc.content = projectDescSeo;
    if (twImg) twImg.content = projectImg;

    ['en', 'pt-BR', 'x-default'].forEach(function(hl) {

      heroBg.appendChild(heroVid);

      var webpHero = dot !== -1 ? heroSrc.substring(0, dot) + '.webp' : null;
      if (webpHero) {
        heroBg.style.backgroundImage = 'url("' + webpHero + '"), url("' + heroSrc + '")';

    // ===== YOUTUBE EMBED HELPER =====
    function createYouTubeEmbed(ytId) {
      var wrapper = document.createElement('div');
      wrapper.className = 'yt-embed';
      var poster = document.createElement('img');
      poster.className = 'yt-poster';
      poster.src = 'https://img.youtube.com/vi/' + ytId + '/maxresdefault.jpg';
      poster.alt = '';
      poster.loading = 'lazy';
      var playBtn = document.createElement('div');
      playBtn.className = 'yt-play';
      playBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
      wrapper.appendChild(poster);
      wrapper.appendChild(playBtn);
      wrapper.addEventListener('click', function() {
        var iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube.com/embed/' + ytId + '?autoplay=1&rel=0&modestbranding=1';
        iframe.setAttribute('allow', 'autoplay; encrypted-media');
        iframe.allowFullscreen = true;
        iframe.title = 'YouTube video player';
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation');
        wrapper.innerHTML = '';
        wrapper.appendChild(iframe);
      });
      return wrapper;
    }

    // ===== RENDER MEDIA GRID =====
    var grid = document.getElementById('mediaGrid');

      // Categorized project (Brett, Doodi)
      project.categories.forEach(function(cat) {
        var section = document.createElement('div');

        var catGrid = document.createElement('div');
        catGrid.className = cat.layout === 'reaction-row' ? 'reaction-row' : 'category-grid';

        cat.media.forEach(function(item, idx) {
          var div = document.createElement('div');
          div.className = 'media-item ' + item.span;
          if (item.hasAudio) div.classList.add('has-audio');
          div.setAttribute('tabindex', '0');
          div.setAttribute('role', 'button');
          if (item.youtube) {
            div.appendChild(createYouTubeEmbed(item.youtube));
          } else if (item.type === 'video') {
            var catVid = document.createElement('video');
            catVid.dataset.src = item.src;
            catVid.muted = true;
            catVid.loop = true;
            catVid.playsInline = true;
            catVid.controls = true;
            div.appendChild(catVid);
          } else {
            div.appendChild(createWebpImg(item.src, project.name + ' - image ' + (idx + 1)));
          }
          if (!item.youtube) {
            div.addEventListener('click', function() { openLightboxWithNav(item); });
            div.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); div.click(); } });
          }
          catGrid.appendChild(div);
        });

        section.appendChild(catGrid);
        grid.appendChild(section);
      });
    } else if (project.media) {
      // Regular flat media array
      project.media.forEach(function(item, i) {
        var div = document.createElement('div');
        div.className = 'media-item ' + item.span + ' reveal';
        if (item.hasAudio) div.classList.add('has-audio');
        div.style.transitionDelay = (i % 4) * 0.08 + 's';
        div.dataset.index = i;
        div.setAttribute('tabindex', '0');
        div.setAttribute('role', 'button');

        if (item.youtube) {
          div.appendChild(createYouTubeEmbed(item.youtube));
        } else if (item.type === 'video') {
          var mediaVid = document.createElement('video');
          mediaVid.dataset.src = item.src;
          mediaVid.muted = true;
          mediaVid.loop = true;
          mediaVid.playsInline = true;
          mediaVid.controls = true;
          div.appendChild(mediaVid);
        } else {
          div.appendChild(createWebpImg(item.src, project.name + ' - image ' + (i + 1)));
        }

        if (!item.youtube) {
          div.addEventListener('click', function() { openLightboxWithNav(item); });
          div.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); div.click(); } });
        }
        grid.appendChild(div);
      });
    }

    // CSS Grid handles layout — no JS masonry needed

    // ===== LIGHTBOX =====
    var lightbox = document.getElementById('lightbox');
    var lightboxContent = document.getElementById('lightboxContent');
    var lightboxCloseBtn = document.getElementById('lightboxClose');
    var lastFocusedElement = null;

    function openLightbox(item) {
      lightboxContent.innerHTML = '';
      var lbEl;
      if (item.youtube) {
        lbEl = document.createElement('iframe');
        lbEl.src = 'https://www.youtube.com/embed/' + item.youtube + '?autoplay=1&rel=0&modestbranding=1';
        lbEl.setAttribute('allow', 'autoplay; encrypted-media');
        lbEl.allowFullscreen = true;
        lbEl.title = 'YouTube video player';
        lbEl.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation');
      } else if (item.type === 'video') {
        lbEl = document.createElement('video');
        lbEl.src = item.src;
        lbEl.controls = true;
        lbEl.loop = true;
      } else {
        lbEl = document.createElement('img');
        lbEl.src = item.src;
        lbEl.alt = project.name;
      }
      lightboxContent.appendChild(lbEl);
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
      lastFocusedElement = document.activeElement;
      lightboxCloseBtn.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      if (lastFocusedElement) lastFocusedElement.focus();
      var vid = lightboxContent.querySelector('video');
      if (vid) vid.pause();
      setTimeout(function() { lightboxContent.innerHTML = ''; }, 350);
    }

    lightboxCloseBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });
    var allMediaItems = [];
    var currentLightboxIndex = -1;

    function collectMediaItems() {
      allMediaItems = [];
      document.querySelectorAll('.media-item').forEach(function(el) {
        var img = el.querySelector('img');
        var vid = el.querySelector('video');
        if (img) allMediaItems.push({ src: img.src, type: 'img' });
        else if (vid) allMediaItems.push({ src: vid.dataset.src || vid.src, type: 'video' });
      });
    }

    function openLightboxWithNav(item) {
      collectMediaItems();
      currentLightboxIndex = allMediaItems.findIndex(function(m) { return m.src.includes(item.src); });
      openLightbox(item);
    }

    function showLightboxIndex(idx) {
      if (idx < 0) idx = allMediaItems.length - 1;
      if (idx >= allMediaItems.length) idx = 0;
      currentLightboxIndex = idx;
      var item = allMediaItems[idx];
      openLightbox(item);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); showLightboxIndex(currentLightboxIndex + 1); }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); showLightboxIndex(currentLightboxIndex - 1); }
    });

    // Focus trap for lightbox
    lightbox.addEventListener('keydown', function(e) {
      if (e.key !== 'Tab') return;
      var focusable = lightbox.querySelectorAll('button, [href], video, [tabindex]:not([tabindex="-1"])');
      if (focusable.length === 0) return;
      var first = focusable[0];
      var last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });

    // ===== PREV / NEXT NAVIGATION (follows homepage order) =====
    var homepageOrder = [
      'gillette', 'downyariel', 'neiro', 'plano-b', 'brett',

      'black-duck', 'veneza', 'candle', 'blockwise',
      'bezzi', 'masedo', 'bula', 'natur',
      'doshadeng', 'insideofme', 'pikachu', 'retiredrobots',
      'astronaut-mural', 'lil-chano', 'ui-ux-design'
    ];
    var nav = document.getElementById('projectNav');
    var orderIndex = homepageOrder.indexOf(projectId);
    if (orderIndex === -1) orderIndex = projectIndex;
    var prevId = orderIndex > 0 ? homepageOrder[orderIndex - 1] : homepageOrder[homepageOrder.length - 1];
    var nextId = orderIndex < homepageOrder.length - 1 ? homepageOrder[orderIndex + 1] : homepageOrder[0];
    var prevProject = projects.find(function(p) { return p.id === prevId; }) || projects[0];
    var nextProject = projects.find(function(p) { return p.id === nextId; }) || projects[0];

    // ===== LENIS SMOOTH SCROLL =====
    var lenis = new Lenis({
      duration: 1.2,
      easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); },
      orientation: 'vertical',
      smoothWheel: true,
      wheelMultiplier: 1.3,
      touchMultiplier: 1.8
    });

    var lenisRafId;
    function raf(time) {
      lenis.raf(time);
      lenisRafId = requestAnimationFrame(raf);
    }
    lenisRafId = requestAnimationFrame(raf);
    window.addEventListener('beforeunload', function() {
      cancelAnimationFrame(lenisRafId);
    });

    // ===== PARALLAX =====
    var heroTitle = document.getElementById('projectTitle');
    var heroType = document.getElementById('projectType');
    var heroDesc = document.getElementById('projectDesc');


    function applyParallax(scrollY) {
      // Hero elements move at different speeds for depth
      if (heroTitle) heroTitle.style.transform = 'translateY(' + (-scrollY * 0.35) + 'px)';
      if (heroType) heroType.style.transform = 'translateY(' + (-scrollY * 0.25) + 'px)';
      if (heroDesc) heroDesc.style.transform = 'translateY(' + (-scrollY * 0.18) + 'px)';

      // Media items parallax removed — conflicts with masonry positioning
    }

    lenis.on('scroll', function(e) { applyParallax(e.scroll); });

    // ===== SCROLL REVEAL =====
    var revealEls = document.querySelectorAll('.reveal');
    var revealObs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          revealObs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });
    revealEls.forEach(function(el) { revealObs.observe(el); });

    // ===== VIDEO LAZY LOAD + VIEWPORT PLAY/PAUSE =====
    var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var previewVideos = document.querySelectorAll('.media-grid video');
    var vidObs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        var vid = e.target;
        if (e.isIntersecting) {
          if (!vid.src && vid.dataset.src) {
            vid.src = vid.dataset.src;
          }
          if (!prefersReducedMotion) {
            vid.play().catch(function() {});
          }
        } else {
          vid.pause();
        }
      });
    }, { threshold: 0.3 });
    previewVideos.forEach(function(v) { vidObs.observe(v); });

    // ===== BACK TO TOP =====
    var backToTopBtn = document.getElementById('backToTop');
    if (backToTopBtn) {
      backToTopBtn.addEventListener('click', function() {
        lenis.scrollTo(0, { duration: 1.5 });
      });
    }

  })();
  </script>

  <div class="page-transition" id="pageTransition"></div>
  <script>
  (function() {
    var overlay = document.getElementById('pageTransition');

    // CSS animation handles fade-out automatically; this handles bfcache
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) {
        overlay.style.animation = 'none';
        overlay.offsetHeight;
        overlay.style.animation = '';
      }
    });

    // Intercept internal links
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a[href]');
      if (!link) return;
      var href = link.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('http') || link.target === '_blank') return;
      e.preventDefault();
      // Clear saved scroll for all explicit nav (prevents landing at wrong position)
      sessionStorage.removeItem('indexScrollY');
      overlay.classList.add('in');
      setTimeout(function() { window.location.href = href; }, 300);
    });
  })();
  </script>

    function setLang(lang) {
      document.querySelectorAll('[data-i18n]').forEach(function(el) {

        if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.querySelectorAll('.lang-btn').forEach(function(b) {
        var isActive = b.dataset.lang === lang;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      // Translate project hero
      var pid = new URLSearchParams(window.location.search).get('id');
      if (pid && lang === 'pt' && projectI18n[pid]) {
        var t = projectI18n[pid];
        if (t.desc) document.getElementById('projectDesc').textContent = t.desc;
        if (t.type) document.getElementById('projectType').textContent = t.type;
        if (t.role !== undefined) document.getElementById('projectRole').textContent = t.role;
      } else if (pid && lang === 'en') {
        // Re-read from the original project data stored on the elements
        var origDesc = document.getElementById('projectDesc').getAttribute('data-orig');
        var origType = document.getElementById('projectType').getAttribute('data-orig');
        var origRole = document.getElementById('projectRole').getAttribute('data-orig');
        if (origDesc) document.getElementById('projectDesc').textContent = origDesc;
        if (origType) document.getElementById('projectType').textContent = origType;
        if (origRole !== null) document.getElementById('projectRole').textContent = origRole;
      }

      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
    }

      var type = document.getElementById('projectType');
      var role = document.getElementById('projectRole');
      if (desc && !desc.getAttribute('data-orig')) desc.setAttribute('data-orig', desc.textContent);
      if (type && !type.getAttribute('data-orig')) type.setAttribute('data-orig', type.textContent);
      if (role && !role.getAttribute('data-orig')) role.setAttribute('data-orig', role.textContent);

      var savedLang = localStorage.getItem('lang') || 'en';
      setLang(savedLang);
    }
